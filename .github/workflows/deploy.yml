name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages and CNAME
        run: |
          # Đảm bảo file .nojekyll tồn tại để GitHub không chặn file JS/CSS
          touch dist/.nojekyll
          # Nếu file CNAME nằm ở gốc repo, copy vào dist để GitHub Pages nhận domain
          if [ -f CNAME ]; then
            cp CNAME dist/CNAME
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Thư mục chứa kết quả build của Vite
          path: dist

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
