<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Lấy đường dẫn hiện tại mà người dùng truy cập
      var path = window.location.pathname;
      // Chuyển hướng về trang chủ và lưu đường dẫn vào query parameter
      window.location.replace('/?redirect=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
