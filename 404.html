<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Lấy đường dẫn hiện tại mà người dùng truy cập
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      // Chuyển hướng về trang chủ và giữ nguyên các tham số
      window.location.replace('/' + (path === '/' ? '' : '?redirect=' + encodeURIComponent(path + search + hash)));
    </script>
  </head>
  <body></body>
</html>
