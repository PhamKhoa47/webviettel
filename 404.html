<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // Redirect to the root and pass the path as a query parameter
      var path = window.location.pathname;
      window.location.replace('./?p=' + path.substring(1));
    </script>
  </head>

  </body>
</html>
