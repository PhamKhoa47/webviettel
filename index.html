  <body>
    <div id="root"></div>
    <script>
      // Xử lý redirect từ 404.html
      (function() {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('redirect');
        if (redirect) {
          history.replaceState(null, null, redirect);
        }
      })();

      // Bắt lỗi runtime để debug trang trắng
      window.onerror = function(message, source, lineno, colno, error) {
        // Bỏ qua lỗi từ extension hoặc các nguồn không xác định
        if (source && (source.indexOf('chrome-extension') !== -1 || source.indexOf('http') === -1)) {
          return;
        }
        var div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.top = '0';
        div.style.left = '0';
        div.style.width = '100%';
        div.style.background = 'red';
        div.style.color = 'white';
        div.style.padding = '10px';
        div.style.zIndex = '9999';
        div.innerHTML = 'Error: ' + message + ' at ' + source + ':' + lineno;
        document.body.appendChild(div);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
